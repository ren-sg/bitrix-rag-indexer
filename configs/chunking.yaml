markdown:
  max_chars: 1800
  overlap_chars: 200

text:
  max_chars: 2200
  overlap_chars: 250

code:
  max_chars: 2600
  overlap_chars: 300

php:
  strategy: "tree-sitter"
  max_chars: 2600
  overlap_chars: 300
  max_uses_in_prefix: 24
  fallback_strategy: "line"
  context:
    include_uses: false
    include_component_context: true
    include_symbol_fqn: true
    include_symbol_modifiers: true

  payload:
    include_uses: false

  phpdoc:
    enabled: true
    include_description: true

    # MVP: keep semantic PHPDoc text and deprecation warnings in embeddings.
    # Do not include noisy API tags yet; we keep only metadata flags for future use.
    include_tags:
      - deprecated

    max_chars: 1200
