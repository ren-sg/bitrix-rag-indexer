profile: "mvp"

sources:
  - name: "manual"
    type: "manual"
    root: "./manual"
    include:
      - "**/*.md"
    exclude: []
    metadata:
      source: "manual"
      area: "manual_notes"
      language: "markdown"

  - name: "project_local"
    type: "bitrix_project_local"
    root: "${BITRIX_PROJECT_ROOT}/local"
    include:
      - "**/*.php"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.vue"
      - "**/*.html"
      - "**/*.htm"
      - "**/*.md"
    exclude:
      - "**/.git/**"
      - "**/lang/**"
      - "**/cache/**"
      - "**/managed_cache/**"
      - "**/stack_cache/**"
      - "**/upload/**"
      - "**/node_modules/**"
      - "**/vendor/**"
      - "**/dist/**"
      - "**/build/**"
      - "**/*.min.js"
      - "**/*.map"
      - "**/*.lock"
    metadata:
      source: "project_local"
      area: "project_code"
