dense:
  provider: "fastembed"
  model: "BAAI/bge-small-en-v1.5"
  batch_size: 32
  cache_enabled: true
  cache_path: ".indexer/cache/embeddings.sqlite"
  model_cache_dir: ".indexer/cache/fastembed_models"
  local_files_only: false
  onnx_log_severity: 3
  preload_cuda_dependencies: true

sparse:
  enabled: true
  model: "Qdrant/bm25"
